<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카메라 촬영</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f97316',
            secondary: '#fb923c',
          }
        }
      }
    }
  </script>
  <style>
    .mirror { transform: rotateY(180deg); }
    .loader { 
      border-top-color: #f97316; 
      animation: spinner 1s linear infinite; 
    }
    @keyframes spinner { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }
    .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes slideUp { 
      from { opacity: 0; transform: translateY(30px) scale(0.95); } 
      to { opacity: 1; transform: translateY(0) scale(1); } 
    }
    .pulse-ring {
      animation: pulseRing 1.5s ease-in-out infinite;
    }
    @keyframes pulseRing {
      0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); }
      70% { box-shadow: 0 0 0 15px rgba(249, 115, 22, 0); }
      100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-800 via-gray-900 to-black min-h-screen flex items-center justify-center p-4">
  
  <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden slide-up">
    
    <!-- 헤더 -->
    <div id="header" class="p-6 bg-gradient-to-r from-orange-500 to-amber-600 text-white text-center">
      <div class="flex items-center justify-center gap-3 mb-2">
        <span id="headerIcon" class="text-4xl">📸</span>
        <h2 class="text-2xl font-bold" id="title">사진 촬영</h2>
      </div>
      <p class="text-orange-100 text-sm" id="subtitle">얼굴을 화면 중앙에 위치시켜주세요</p>
    </div>
    
    <!-- 본문 -->
    <div class="p-6 space-y-4">
      
      <!-- 카메라 상태 표시 -->
      <div id="camera-status" class="text-center py-8">
        <div class="loader rounded-full border-4 border-gray-200 h-12 w-12 mx-auto mb-4"></div>
        <p class="text-gray-600 font-medium">카메라 준비 중...</p>
      </div>
      
      <!-- 비디오 영역 -->
      <div id="video-container" class="hidden">
        <div class="relative rounded-2xl overflow-hidden bg-black aspect-video border-2 border-orange-200 shadow-xl">
          <video id="video" class="w-full h-full object-cover mirror" autoplay muted playsinline></video>
          
          <!-- 얼굴 가이드 오버레이 -->
          <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="w-48 h-60 border-2 border-white/40 rounded-[50%]"></div>
          </div>
        </div>
        
        <div class="mt-3 bg-orange-50 p-3 rounded-xl border border-orange-200 text-center">
          <p class="text-sm text-orange-800">
            💡 정면을 바라보고 얼굴이 타원 안에 들어오도록 해주세요
          </p>
        </div>
      </div>
      
      <!-- 촬영 결과 미리보기 -->
      <div id="preview-container" class="hidden">
        <div class="rounded-2xl overflow-hidden border-2 border-green-300 shadow-xl">
          <img id="preview-image" class="w-full mirror" />
        </div>
        <div class="mt-3 bg-green-50 p-3 rounded-xl border border-green-200 text-center">
          <p class="text-sm text-green-800 font-semibold">✅ 촬영 완료! 확인 후 버튼을 눌러주세요</p>
        </div>
      </div>
      
      <!-- 촬영 버튼 -->
      <div id="btn-capture-group" class="hidden space-y-3">
        <button onclick="capture()" id="captureBtn"
          class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white p-5 rounded-2xl font-bold text-lg hover:from-green-600 hover:to-emerald-700 active:scale-[0.98] transition shadow-lg pulse-ring">
          📸 촬영하기
        </button>
      </div>
      
      <!-- 촬영 후 버튼 -->
      <div id="btn-after-group" class="hidden space-y-3">
        <button onclick="sendAndClose()" id="sendBtn"
          class="w-full bg-gradient-to-r from-orange-500 to-amber-600 text-white p-5 rounded-2xl font-bold text-lg hover:from-orange-600 hover:to-amber-700 active:scale-[0.98] transition shadow-lg">
          ✅ 이 사진 사용하기
        </button>
        <button onclick="retake()"
          class="w-full bg-gray-100 text-gray-700 p-4 rounded-2xl font-semibold hover:bg-gray-200 transition">
          🔄 다시 촬영
        </button>
      </div>
      
      <!-- 취소 버튼 -->
      <button onclick="cancelAndClose()" 
        class="w-full bg-gray-50 text-gray-500 p-3 rounded-2xl font-medium hover:bg-gray-100 transition text-sm">
        취소하고 돌아가기
      </button>
      
      <!-- 에러 시 안내 -->
      <div id="error-section" class="hidden">
        <div class="bg-red-50 p-4 rounded-xl border-2 border-red-200">
          <p class="text-red-800 font-semibold mb-2">❌ 카메라 접근 실패</p>
          <p id="error-message" class="text-red-600 text-sm mb-3"></p>
          <div class="space-y-2 text-xs text-red-700">
            <p><strong>해결 방법:</strong></p>
            <p>1. 주소창 왼쪽 🔒 아이콘 클릭</p>
            <p>2. 카메라 → "허용" 선택</p>
            <p>3. 페이지 새로고침</p>
          </div>
          <button onclick="location.reload()" class="mt-3 w-full bg-red-500 text-white p-3 rounded-xl font-semibold hover:bg-red-600 transition">
            🔄 새로고침
          </button>
        </div>
      </div>
    </div>
  </div>
  
  <canvas id="canvas" class="hidden"></canvas>

<script>
  // URL 파라미터에서 모드 읽기
  const params = new URLSearchParams(window.location.search);
  const mode = params.get('mode') || 'register';
  // ★ GAS 웹앱의 origin (postMessage 대상)
  const gasOrigin = params.get('origin') || '*';

  let stream = null;
  let capturedImageData = null;

  // 모드에 따라 헤더 업데이트
  function updateHeader() {
    const icon = document.getElementById('headerIcon');
    const title = document.getElementById('title');
    const subtitle = document.getElementById('subtitle');
    const header = document.getElementById('header');
    
    if (mode === 'auth') {
      icon.textContent = '🔐';
      title.textContent = '출퇴근 인증 촬영';
      subtitle.textContent = '본인 확인을 위해 얼굴을 촬영합니다';
    } else {
      icon.textContent = '📸';
      title.textContent = '얼굴 등록 촬영';
      subtitle.textContent = '등록할 얼굴 사진을 촬영합니다';
      header.className = 'p-6 bg-gradient-to-r from-blue-500 to-indigo-600 text-white text-center';
    }
  }

  // 카메라 시작
  async function initCamera() {
    updateHeader();
    
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const videoDevices = devices.filter(d => d.kind === 'videoinput');
      console.log('📷 감지된 카메라:', videoDevices.length);
      
      if (videoDevices.length === 0) {
        showError('카메라 장치를 찾을 수 없습니다.');
        return;
      }
      
      stream = await navigator.mediaDevices.getUserMedia({
        video: { 
          facingMode: 'user', 
          width: { ideal: 640 }, 
          height: { ideal: 480 } 
        },
        audio: false
      });
      
      const video = document.getElementById('video');
      video.srcObject = stream;
      
      video.onloadedmetadata = function() {
        video.play().then(() => {
          console.log('✅ 카메라 시작 성공');
          document.getElementById('camera-status').classList.add('hidden');
          document.getElementById('video-container').classList.remove('hidden');
          document.getElementById('btn-capture-group').classList.remove('hidden');
        }).catch(err => {
          showError('비디오 재생에 실패했습니다: ' + err.message);
        });
      };
      
    } catch(e) {
      console.error('카메라 오류:', e.name, e.message);
      
      if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
        showError('카메라 권한이 거부되었습니다.\n브라우저 설정에서 카메라 권한을 허용해주세요.');
      } else if (e.name === 'NotFoundError') {
        showError('카메라를 찾을 수 없습니다.');
      } else if (e.name === 'NotReadableError') {
        showError('카메라가 다른 앱에서 사용 중입니다.\n다른 앱을 닫고 다시 시도해주세요.');
      } else {
        showError('카메라 오류: ' + e.message);
      }
    }
  }
  
  function showError(msg) {
    document.getElementById('camera-status').classList.add('hidden');
    document.getElementById('error-section').classList.remove('hidden');
    document.getElementById('error-message').textContent = msg;
  }

  // 촬영
  function capture() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    
    if (!video.srcObject || video.videoWidth === 0) {
      alert('카메라가 준비되지 않았습니다.');
      return;
    }
    
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    
    capturedImageData = canvas.toDataURL('image/jpeg', 0.9);
    
    document.getElementById('preview-image').src = capturedImageData;
    document.getElementById('video-container').classList.add('hidden');
    document.getElementById('preview-container').classList.remove('hidden');
    document.getElementById('btn-capture-group').classList.add('hidden');
    document.getElementById('btn-after-group').classList.remove('hidden');
  }
  
  // 다시 촬영
  function retake() {
    capturedImageData = null;
    document.getElementById('preview-container').classList.add('hidden');
    document.getElementById('video-container').classList.remove('hidden');
    document.getElementById('btn-after-group').classList.add('hidden');
    document.getElementById('btn-capture-group').classList.remove('hidden');
  }
  
  // ★ 전송 후 닫기 - opener에게 postMessage
  function sendAndClose() {
    if (!capturedImageData) {
      alert('촬영된 사진이 없습니다.');
      return;
    }
    
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }
    
    // opener(GAS 메인 페이지)에 이미지 전달
    if (window.opener && !window.opener.closed) {
      try {
        window.opener.postMessage({
          type: 'camera-capture',
          mode: mode,
          imageData: capturedImageData
        }, '*');
        console.log('✅ 이미지 전달 완료 (postMessage)');
      } catch(e) {
        console.error('postMessage 실패:', e);
      }
    } else {
      console.warn('⚠️ opener 없음');
      alert('메인 페이지와 연결이 끊어졌습니다.\n메인 페이지에서 다시 시도해주세요.');
      return;
    }
    
    const sendBtn = document.getElementById('sendBtn');
    sendBtn.textContent = '✅ 전송 완료! 창이 닫힙니다...';
    sendBtn.disabled = true;
    sendBtn.className = 'w-full bg-gray-400 text-white p-5 rounded-2xl font-bold text-lg cursor-not-allowed';
    
    setTimeout(() => {
      window.close();
      setTimeout(() => {
        document.getElementById('sendBtn').textContent = '✅ 전송 완료! 이 탭을 닫아주세요';
      }, 500);
    }, 1000);
  }
  
  // 취소
  function cancelAndClose() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }
    
    if (window.opener && !window.opener.closed) {
      try {
        window.opener.postMessage({ type: 'camera-cancel', mode: mode }, '*');
      } catch(e) {}
    }
    
    window.close();
    setTimeout(() => {
      alert('이 탭을 닫아주세요.');
    }, 500);
  }

  initCamera();
</script>
</body>
</html>
